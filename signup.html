<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte | PHENIX TECH-SERVICES</title>
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="config.js"></script>
    <link rel="icon" type="image/x-icon" href="images/logo.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #050811 0%, #0A0F1A 50%, #0F1522 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(42, 92, 170, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 107, 53, 0.08) 0%, transparent 25%);
            z-index: -1;
            pointer-events: none;
        }

        .signup-container {
            width: 100%;
            max-width: 480px;
            padding: 30px;
            margin: 20px;
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-card {
            background: rgba(5, 8, 17, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 30px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-section h1 {
            font-size: 28px;
            background: linear-gradient(to right, #2A5CAA, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header-section p {
            color: #94A3B8;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #CBD5E1;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="phone"],
        select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(30, 41, 59, 0.5);
            border: 1.5px solid #334155;
            border-radius: 10px;
            color: #F0F4F8;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            outline: none;
            background: rgba(30, 41, 59, 0.8);
            border-color: #2A5CAA;
            box-shadow: 0 0 0 4px rgba(42, 92, 170, 0.15);
        }

        input::placeholder {
            color: #64748B;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .password-strength {
            margin-top: 8px;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0%;
            background: #EF4444;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-text {
            font-size: 11px;
            color: #94A3B8;
            min-width: 50px;
            text-align: right;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #2A5CAA;
            flex-shrink: 0;
        }

        .checkbox-group label {
            margin: 0;
            font-size: 13px;
            color: #94A3B8;
            text-transform: none;
            letter-spacing: normal;
            font-weight: 400;
            line-height: 1.5;
            cursor: pointer;
        }

        .checkbox-group a {
            color: #2A5CAA;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .checkbox-group a:hover {
            color: #FF6B35;
            text-decoration: underline;
        }

        .signup-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #2A5CAA 0%, #1E447F 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(42, 92, 170, 0.3);
            margin-top: 10px;
        }

        .signup-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(42, 92, 170, 0.4);
        }

        .signup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
            color: #94A3B8;
        }

        .login-link a {
            color: #2A5CAA;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #FF6B35;
            text-decoration: underline;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #FCA5A5;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: none;
            font-size: 12px;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: #86EFAC;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: none;
            font-size: 12px;
            align-items: center;
            gap: 8px;
        }

        .success-message.show {
            display: flex;
        }

        .loading {
            display: none;
            text-align: center;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #2A5CAA;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 20px;
            }

            .signup-card {
                padding: 40px 24px 30px;
            }

            .header-section h1 {
                font-size: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="signup-container">
        <div class="signup-card">
            <div class="header-section">
                <h1>CRÉER UN COMPTE</h1>
                <p>Rejoignez PHENIX TECH-SERVICES</p>
            </div>

            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="error-message" id="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text"></span>
                </div>

                <div class="success-message" id="success-message">
                    <i class="fas fa-check-circle"></i>
                    <span id="success-text">Compte créé avec succès, redirection...</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstname">Prénom</label>
                        <input 
                            type="text" 
                            id="firstname" 
                            name="firstname" 
                            placeholder="MARCEL FAYA"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="lastname">Nom</label>
                        <input 
                            type="text" 
                            id="lastname" 
                            name="lastname" 
                            placeholder="LENO"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="jean.dupont@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Téléphone</label>
                    <input 
                        type="phone" 
                        id="phone" 
                        name="phone" 
                        placeholder="611 33 14 67"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required
                        onchange="updatePasswordStrength()"
                    >
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-bar-fill" id="strength-bar"></div>
                        </div>
                        <span class="strength-text" id="strength-text">Faible</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirm-password" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        J'accepte les <a href="#" onclick="return false;">conditions d'utilisation</a> 
                        et la <a href="#" onclick="return false;">politique de confidentialité</a>
                    </label>
                </div>

                <button type="submit" class="signup-btn" id="signup-btn">
                    <i class="fas fa-user-plus"></i>
                    Créer mon compte
                </button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="color: #94A3B8; font-size: 12px;">Création du compte en cours...</p>
                </div>

                <div class="login-link">
                    Vous avez déjà un compte ? 
                    <a href="login-user.html">Se connecter</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_BASE_URL: 'http://localhost:5000/api',
            DEMO_MODE: true
        };

        // Vérifier si déjà connecté
        window.addEventListener('load', () => {
            const token = localStorage.getItem('user_token');
            if (token) {
                window.location.href = 'index.html';
            }
        });

        // Mettre à jour la force du mot de passe
        function updatePasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strength-bar');
            const strengthText = document.getElementById('strength-text');
            
            let strength = 0;
            
            if (password.length >= 8) strength += 25;
            if (password.length >= 12) strength += 25;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 15;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 10;
            
            strengthBar.style.width = strength + '%';
            
            if (strength < 25) {
                strengthBar.style.background = '#EF4444';
                strengthText.textContent = 'Faible';
            } else if (strength < 50) {
                strengthBar.style.background = '#F59E0B';
                strengthText.textContent = 'Moyen';
            } else if (strength < 75) {
                strengthBar.style.background = '#10B981';
                strengthText.textContent = 'Bon';
            } else {
                strengthBar.style.background = '#06B6D4';
                strengthText.textContent = 'Excellent';
            }
        }

        // Gérer l'inscription
        async function handleSignup(event) {
            event.preventDefault();

            // Validation
            const firstname = document.getElementById('firstname').value.trim();
            const lastname = document.getElementById('lastname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const terms = document.getElementById('terms').checked;

            if (!firstname || !lastname) {
                showMessage('error-message', 'Veuillez entrer votre prénom et nom');
                return;
            }

            if (!email) {
                showMessage('error-message', 'Veuillez entrer une adresse email valide');
                return;
            }

            if (password.length < 8) {
                showMessage('error-message', 'Le mot de passe doit contenir au moins 8 caractères');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('error-message', 'Les mots de passe ne correspondent pas');
                return;
            }

            if (!terms) {
                showMessage('error-message', 'Vous devez accepter les conditions d\'utilisation');
                return;
            }

            hideMessage('error-message');
            hideMessage('success-message');
            showLoading();

            try {
                // Essayer via l'API
                let signupSuccess = false;
                let userData = null;

                try {
                    const response = await fetch(`${CONFIG.API_BASE_URL}/auth/signup`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            firstname,
                            lastname,
                            email,
                            phone: phone || null,
                            password
                        })
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        signupSuccess = true;
                        userData = result.data;
                    } else {
                        showMessage('error-message', result.message || 'Erreur lors de l\'inscription');
                    }
                } catch (error) {
                    console.error('Erreur API:', error);
                    
                    // Mode démo
                    if (CONFIG.DEMO_MODE) {
                        signupSuccess = true;
                        userData = {
                            id: 'user-' + Math.random().toString(36).substr(2, 9),
                            firstname,
                            lastname,
                            email,
                            phone,
                            token: 'demo-token-' + Math.random().toString(36).substr(2, 9)
                        };
                        showMessage('success-message', 'Mode démo - Compte créé avec succès');
                    }
                }

                if (signupSuccess && userData) {
                    // Sauvegarder les données
                    localStorage.setItem('user_token', userData.token);
                    localStorage.setItem('user_info', JSON.stringify({
                        id: userData.id,
                        firstname: userData.firstname,
                        lastname: userData.lastname,
                        email: userData.email,
                        phone: userData.phone
                    }));

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('error-message', 'Erreur de connexion réseau');
            } finally {
                hideLoading();
            }
        }

        // Afficher un message
        function showMessage(elementId, text) {
            const element = document.getElementById(elementId);
            if (elementId === 'error-message') {
                document.getElementById('error-text').textContent = text;
            } else if (elementId === 'success-message') {
                document.getElementById('success-text').textContent = text;
            }
            element.classList.add('show');
        }

        // Cacher un message
        function hideMessage(elementId) {
            document.getElementById(elementId).classList.remove('show');
        }

        // Afficher le loader
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('signup-btn').disabled = true;
        }

        // Cacher le loader
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('signup-btn').disabled = false;
        }
    </script>
</body>
</html>
