<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | PHENIX TECH-SERVICES</title>
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="config.js"></script>
    <script src="theme.js"></script>
    <link rel="icon" type="image/x-icon" href="images/logo.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #050811 0%, #0A0F1A 50%, #0F1522 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(42, 92, 170, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 107, 53, 0.08) 0%, transparent 25%);
            z-index: -1;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 30px;
            margin: 20px;
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(5, 8, 17, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 30px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            border-radius: 16px;
            border: 2px solid rgba(42, 92, 170, 0.5);
            box-shadow: 0 10px 30px rgba(42, 92, 170, 0.3);
            object-fit: cover;
            transition: all 0.3s ease;
        }

        .logo-img:hover {
            border-color: #2A5CAA;
            box-shadow: 0 15px 40px rgba(42, 92, 170, 0.5);
            transform: scale(1.05);
        }

        .logo-text h1 {
            font-size: 28px;
            background: linear-gradient(to right, #2A5CAA, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 13px;
            color: #94A3B8;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #CBD5E1;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 16px 18px;
            background: rgba(30, 41, 59, 0.5);
            border: 1.5px solid #334155;
            border-radius: 12px;
            color: #F0F4F8;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            background: rgba(30, 41, 59, 0.8);
            border-color: #2A5CAA;
            box-shadow: 0 0 0 4px rgba(42, 92, 170, 0.15);
        }

        input::placeholder {
            color: #64748B;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            color: #94A3B8;
            font-size: 13px;
            cursor: pointer;
            font-weight: 400;
            text-transform: none;
            letter-spacing: normal;
        }

        .remember-forgot input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #2A5CAA;
        }

        .remember-forgot a {
            color: #2A5CAA;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .remember-forgot a:hover {
            color: #FF6B35;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #2A5CAA 0%, #1E447F 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(42, 92, 170, 0.3);
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(42, 92, 170, 0.4);
        }

        .login-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-btn i {
            font-size: 16px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 35px 0;
            color: #475569;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        .signup-link {
            text-align: center;
            color: #94A3B8;
            font-size: 13px;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .signup-link a {
            color: #2A5CAA;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .signup-link a:hover {
            color: #FF6B35;
            text-decoration: underline;
        }

        .back-to-shop {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2A5CAA;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .back-to-shop:hover {
            color: #FF6B35;
            transform: translateX(-3px);
        }

        .back-to-shop i {
            font-size: 14px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #FCA5A5;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: none;
            font-size: 13px;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: #86EFAC;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: none;
            font-size: 13px;
            align-items: center;
            gap: 10px;
        }

        .success-message.show {
            display: flex;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #2A5CAA;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: #94A3B8;
            font-size: 13px;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 20px;
            }

            .login-card {
                padding: 40px 24px 30px;
            }

            .logo-text h1 {
                font-size: 24px;
            }

            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-group:nth-child(2) {
            animation: fadeIn 0.6s ease 0.2s forwards;
            opacity: 0;
        }

        .form-group:nth-child(3) {
            animation: fadeIn 0.6s ease 0.3s forwards;
            opacity: 0;
        }

        .login-btn {
            animation: fadeIn 0.6s ease 0.4s forwards;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="login-container">
        <div class="login-card">
            <a href="index.html" class="back-to-shop">
                <i class="fas fa-arrow-left"></i>
                Retour à la boutique
            </a>

            <div class="logo-section">
                <img src="images/logo.jpg" alt="PHENIX TECH-SERVICES" class="logo-img" onerror="this.src='https://via.placeholder.com/80?text=Logo'">
                <div class="logo-text">
                    <h1>PHENIX</h1>
                    <p>Boutique en ligne</p>
                </div>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="error-message" id="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text"></span>
                </div>

                <div class="success-message" id="success-message">
                    <i class="fas fa-check-circle"></i>
                    <span id="success-text">Connexion réussie, redirection...</span>
                </div>

                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="jean@example.com" 
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" name="remember" id="remember">
                        Se souvenir de moi
                    </label>
                    <a href="#" onclick="handleForgotPassword(event)">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="login-btn" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Connexion
                </button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div class="loader-text">Vérification des identifiants...</div>
                </div>
            </form>

            <div class="signup-link">
                Pas encore de compte ? 
                <a href="signup.html">Créer un compte</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // Vérifier si déjà connecté
        window.addEventListener('load', () => {
            if (CONFIG.isUserLoggedIn()) {
                window.location.href = 'index.html';
            }
        });

        // Gérer la connexion
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            hideMessage('error-message');
            hideMessage('success-message');
            showLoading();

            try {
                const endpoint = CONFIG.getEndpoint('AUTH_LOGIN');
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Sauvegarder les données
                    localStorage.setItem(CONFIG.STORAGE.USER_TOKEN, result.data.token);
                    localStorage.setItem(CONFIG.STORAGE.USER_INFO, JSON.stringify({
                        id: result.data.id,
                        firstname: result.data.firstname,
                        lastname: result.data.lastname,
                        email: result.data.email
                    }));

                    if (remember) {
                        localStorage.setItem(CONFIG.STORAGE.REMEMBER_EMAIL, email);
                    }

                    showMessage('success-message', 'Connexion réussie...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showMessage('error-message', result.message || 'Email ou mot de passe incorrect');
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('error-message', 'Erreur réseau. Vérifiez votre connexion.');
            } finally {
                hideLoading();
            }
        }

        function showMessage(elementId, text) {
            const element = document.getElementById(elementId);
            if (elementId === 'error-message') {
                document.getElementById('error-text').textContent = text;
            } else if (elementId === 'success-message') {
                document.getElementById('success-text').textContent = text;
            }
            element.classList.add('show');
        }

        function hideMessage(elementId) {
            document.getElementById(elementId).classList.remove('show');
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('login-btn').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('login-btn').disabled = false;
        }

        function handleForgotPassword(event) {
            event.preventDefault();
            showMessage('error-message', 'Fonction non disponible - Contactez le support');
        }

        // Pré-remplir l'email si "Se souvenir" était coché
        window.addEventListener('load', () => {
            const rememberEmail = localStorage.getItem(CONFIG.STORAGE.REMEMBER_EMAIL);
            if (rememberEmail) {
                document.getElementById('email').value = rememberEmail;
                document.getElementById('remember').checked = true;
            }
        });

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('login-form').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
