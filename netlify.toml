# Netlify Configuration pour PHENIX-TECH-SERVICES Frontend
# Production Frontend hébergé sur Netlify

[build]
  command = "echo 'Frontend statique - pas de build requis'"
  publish = "."

# Redirects pour SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Protection CORS pour l'API backend
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://backend-phenix.onrender.com"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

# Headers spécifiques pour les fichiers statiques
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/javascript"

# Context production
[context.production]
  environment = { NODE_ENV = "production" }

# Context preview
[context.deploy-preview]
  environment = { NODE_ENV = "preview" }

# Context branch-deploy
[context.branch-deploy]
  environment = { NODE_ENV = "development" }
